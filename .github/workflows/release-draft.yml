name: Release Draft

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  create_release:
    name: Create Release Draft
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Verify release tag
        id: release
        shell: bash
        run: |
          tag="$GITHUB_REF_NAME"
          version="${tag#v}"
          package_version="$(node -p "require('./package.json').version")"

          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Release tag must use semver format like v1.2.3 or v1.2.3-beta.1." >&2
            exit 1
          fi

          if [[ "$package_version" != "$version" ]]; then
            echo "package.json version ($package_version) does not match tag ($tag)." >&2
            exit 1
          fi

          prerelease=false
          if [[ "$version" == *-* ]]; then
            prerelease=true
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Create release draft
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          args=(
            "$GITHUB_REF_NAME"
            --draft
            --verify-tag
            --title "Release $GITHUB_REF_NAME"
            --notes "Edit this draft"
          )

          if [[ "${{ steps.release.outputs.prerelease }}" == "true" ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
